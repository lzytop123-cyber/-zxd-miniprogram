# 生产环境：MySQL + Redis + API
# 用法: docker compose -f docker-compose.prod.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: zxd-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ChangeMeRoot123}
      MYSQL_DATABASE: zxd_study
      MYSQL_USER: zxd
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ChangeMeZxd123}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zxd-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zxd-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      DATABASE_URL: mysql+pymysql://zxd:${MYSQL_PASSWORD:-ChangeMeZxd123}@mysql:3306/zxd_study?charset=utf8mb4
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/certs:/app/certs:ro
      - ./backend/data:/app/data

volumes:
  mysql_data:
  redis_data:
